version: '3.9'

services:
  pulse-app:
    build:
      context: .
      dockerfile: Dockerfile
    # Change this to match your Docker Hub image for deployment
    image: iamparab/pulse-app:latest 
    container_name: pulse-app
    ports:
      - "3000:80"
    restart: unless-stopped
    # Environment section removed to fix the 'mapping' error
